<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Mantenimiento - Mercedes Benz
        -- DILMER ANGEL--
    </title>
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .seccion { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { background: #007AFF; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .rojo { background: #dc3545; }
        .rojo:hover { background: #b02a37; }
        .verde { background: #28a745; }
        .verde:hover { background: #218838; }
        .historial { margin-top: 15px; border-top: 2px solid #eee; padding-top: 15px; }
        .registro { border-left: 4px solid #007AFF; padding: 10px; margin: 10px 0; background: #f9f9f9; }
        .total { font-size: 20px; font-weight: bold; color: #dc3545; margin-top: 10px; }
        .boleta { margin-top: 15px; padding: 15px; border: 2px dashed #666; }
        #acceso { display: block; }
        #app { display: none; }
    </style>
</head>
<body>

<!-- SECCIÓN DE ACCESO -->
<div id="acceso" class="seccion">
    <h2>🔐 Acceso - Mantenimiento Mercedes Benz</h2>
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="tel" id="celular" placeholder="Número de celular" required>
    <button onclick="ingresar()">Ingresar a la aplicación</button>
</div>

<!-- SECCIÓN PRINCIPAL DE LA APP -->
<div id="app">
    <div class="seccion">
        <h2>🚘 Buscar vehículo por placa</h2>
        <input type="text" id="placa" placeholder="Ingrese la placa (ej: A1B-234)" required>
        <button onclick="buscarPlaca()">Ver historial / Nuevo registro</button>
    </div>

    <div id="zonaTrabajo" class="seccion" style="display: none;">
        <h3>Vehículo: <span id="placaMostrada"></span></h3>
        <hr style="margin:10px 0;">

        <!-- FORMULARIO PARA AGREGAR REGISTRO -->
        <h4>📝 Agregar nuevo mantenimiento</h4>
        <input type="date" id="fecha">
        <textarea id="trabajo" rows="3" placeholder="Descripción: ej: Cambio filtro de aire, filtro de aceite, etc." required></textarea>
        <input type="number" id="precioRepuestos" placeholder="Total precio repuestos (S/.)" min="0" step="0.01" required>
        <input type="number" id="manoObra" placeholder="Costo mano de obra (S/.)" min="0" step="0.01" required>
        <button onclick="agregarRegistro()" class="verde">Guardar registro</button>

        <!-- HISTORIAL COMPLETO DE LA PLACA -->
        <div class="historial">
            <h4>📋 Historial completo del vehículo</h4>
            <div id="listaHistorial"></div>
        </div>

        <!-- BOLETA / FACTURA -->
        <div class="boleta">
            <h4>🧾 Generar documento</h4>
            <select id="tipoDocumento">
                <option value="boleta">Boleta de Venta</option>
                <option value="factura">Factura Electrónica</option>
            </select>
            <button onclick="generarDocumento()">Generar y ver</button>
            <div id="vistaDocumento" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
// Base de datos local (se guarda en el celular)
let baseDatos = JSON.parse(localStorage.getItem('mantenimientos')) || {};

// 1. Ingreso del usuario
function ingresar() {
    const nombre = document.getElementById('nombre').value.trim();
    const celular = document.getElementById('celular').value.trim();
    if(!nombre || !celular) return alert('Complete todos los datos');
    
    localStorage.setItem('usuario', JSON.stringify({nombre, celular}));
    document.getElementById('acceso').style.display = 'none';
    document.getElementById('app').style.display = 'block';
}

// 2. Buscar placa única
function buscarPlaca() {
    const placa = document.getElementById('placa').value.trim().toUpperCase();
    if(!placa) return alert('Ingrese una placa válida');

    document.getElementById('zonaTrabajo').style.display = 'block';
    document.getElementById('placaMostrada').textContent = placa;
    document.getElementById('fecha').valueAsDate = new Date();

    // Si la placa no existe, se crea su espacio vacío
    if(!baseDatos[placa]) baseDatos[placa] = [];
    mostrarHistorial(placa);
}

// 3. Mostrar historial SOLO de esa placa
function mostrarHistorial(placa) {
    const lista = document.getElementById('listaHistorial');
    lista.innerHTML = '';
    let totalGeneral = 0;

    baseDatos[placa].forEach(registro => {
        const total = Number(registro.repuestos) + Number(registro.manoObra);
        totalGeneral += total;

        lista.innerHTML += `
        <div class="registro">
            <p><strong>Fecha:</strong> ${registro.fecha}</p>
            <p><strong>Trabajo:</strong> ${registro.trabajo}</p>
            <p>Precio repuestos: S/ ${registro.repuestos}</p>
            <p>Mano de obra: S/ ${registro.manoObra}</p>
            <p><strong>Total parcial: S/ ${total.toFixed(2)}</strong></p>
        </div>
        `;
    });

    lista.innerHTML += `<p class="total">TOTAL ACUMULADO: S/ ${totalGeneral.toFixed(2)}</p>`;
}

// 4. Agregar nuevo registro a la placa actual
function agregarRegistro() {
    const placa = document.getElementById('placa').value.trim().toUpperCase();
    const fecha = document.getElementById('fecha').value;
    const trabajo = document.getElementById('trabajo').value.trim();
    const repuestos = document.getElementById('precioRepuestos').value;
    const manoObra = document.getElementById('manoObra').value;

    if(!fecha || !trabajo || !repuestos || !manoObra) return alert('Complete todos los campos');

    // Agrega al historial SIN modificar otros vehículos
    baseDatos[placa].push({fecha, trabajo, repuestos, manoObra});
    localStorage.setItem('mantenimientos', JSON.stringify(baseDatos));

    alert('✅ Registro guardado correctamente');
    mostrarHistorial(placa);
    // Limpia campos para siguiente registro
    document.getElementById('trabajo').value = '';
    document.getElementById('precioRepuestos').value = '';
    document.getElementById('manoObra').value = '';
}

// 5. Generar boleta/factura
function generarDocumento() {
    const placa = document.getElementById('placa').value.trim().toUpperCase();
    const tipo = document.getElementById('tipoDocumento').value;
    const usuario = JSON.parse(localStorage.getItem('usuario'));
    const total = baseDatos[placa].reduce((sum, r) => sum + Number(r.repuestos) + Number(r.manoObra), 0).toFixed(2);

    document.getElementById('vistaDocumento').innerHTML = `
    <div style="padding:15px; background:#f8f9fa; border-radius:5px;">
        <h4>${tipo.toUpperCase()}</h4>
        <p>Empresa: Taller Autorizado Mercedes Benz</p>
        <p>Placa vehículo: ${placa}</p>
        <p>Registrado por: ${usuario.nombre} - ${usuario.celular}</p>
        <hr>
        <p><strong>Total a pagar: S/ ${total}</strong></p>
        <p style="font-size:12px; margin-top:10px;">*Documento generado el ${new Date().toLocaleDateString()}</p>
    </div>
    `;
}

// Recuperar sesión si ya ingresó antes
window.onload = () => {
    if(localStorage.getItem('usuario')) {
        document.getElementById('acceso').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }
}
</script>
</body>
</html>
